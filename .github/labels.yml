# Declarative label definitions for Nexus Anime.
# Synced to GitHub via the label-sync workflow.
# Colors are hex without the leading #.

# Type
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "feature"
  color: "a2eeef"
  description: "New functionality"
- name: "docs"
  color: "0075ca"
  description: "Documentation"
- name: "chore"
  color: "cfd3d7"
  description: "Maintenance, tooling, dependencies"
- name: "refactor"
  color: "c5def5"
  description: "Code change that neither fixes a bug nor adds a feature"
- name: "question"
  color: "d876e3"
  description: "Further information is requested"

# Priority
- name: "priority:critical"
  color: "b60205"
  description: "Drop everything — blocks release or loses data"
- name: "priority:high"
  color: "d93f0b"
  description: "Important, schedule soon"
- name: "priority:medium"
  color: "fbca04"
  description: "Normal priority"
- name: "priority:low"
  color: "0e8a16"
  description: "Nice to have"

# Status
- name: "blocked"
  color: "000000"
  description: "Waiting on another issue or external dependency"
- name: "in-progress"
  color: "dddddd"
  description: "Actively being worked on"
- name: "needs-review"
  color: "5319e7"
  description: "Needs triage or code review"
- name: "good-first-issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help-wanted"
  color: "008672"
  description: "Extra attention is needed"

# Scope
- name: "scope:web"
  color: "c2e0c6"
  description: "apps/web"
- name: "scope:ui"
  color: "c2e0c6"
  description: "packages/ui"
- name: "scope:db"
  color: "c2e0c6"
  description: "packages/db"
- name: "scope:cache"
  color: "c2e0c6"
  description: "packages/cache"
- name: "scope:ci"
  color: "c2e0c6"
  description: "CI, workflows, automation"
- name: "scope:docs"
  color: "c2e0c6"
  description: "Documentation"

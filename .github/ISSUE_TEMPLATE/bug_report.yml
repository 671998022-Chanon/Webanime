name: Bug Report
description: Report something that isn't working
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we see the same behavior?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?

  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser, OS, app version or commit SHA.
      placeholder: Chrome 125, macOS 14, commit abc123

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output or attach screenshots.
      render: shell
